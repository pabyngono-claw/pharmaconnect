name: pharmaconnect_client
description: Senegal-focused pharmacy connectivity platform client application.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^10.0.0

  # State Management
  provider: ^6.0.5

  # Network
  http: ^1.1.0

  # Secure Storage (token management)
  flutter_secure_storage: ^8.0.0

  # Environment Config
  flutter_dotenv: ^5.1.0

  # Utilities & Logging
  uuid: ^4.0.0
  intl: ^0.18.1

  # Media (Pre-flight compressed uploads)
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0

  # Native & Location Plugins (Abstracted setup)
  permission_handler: ^11.0.1
  google_maps_flutter: ^2.5.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
