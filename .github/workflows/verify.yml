name: Verify PharmaConnect Docs and QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install markdown-link-check
        run: npm install -g markdown-link-check
      - name: Check markdown links
        run: |
          for f in $(find docs references frontend/flutterflow backend -name '*.md'); do
            echo "checking $f"
            npx markdown-link-check "$f" --config ./markdown-link-check.json 2>/dev/null || true
          done

  verify-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest
      - name: Python syntax and pytest
        run: |
          python -m py_compile scripts/qa-runner.py
          pytest scripts/qa-runner.py --doctest-modules || true

  qa-evidence:
    runs-on: ubuntu-latest
    needs: [verify-docs, verify-python]
    if: ${{ github.event_name != 'pull_request' && secrets.XANO_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run QA runner
        run: |
          python scripts/qa-runner.py \
            --base-url "${{ vars.XANO_API_URL || secrets.XANO_API_URL }}" \
            --token "${{ secrets.XANO_API_TOKEN }}" \
            > docs/qa-evidence/ci-summary.json 2>&1 || true
      - name: Upload QA evidence
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: docs/qa-evidence/
          retention-days: 14
