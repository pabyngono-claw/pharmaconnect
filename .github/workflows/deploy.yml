name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci || true
      - name: Build frontend
        run: |
          echo "TODO: replace with actual FlutterFlow or static export build command"
          mkdir -p dist && cp frontend/index.html dist/ 2>/dev/null || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pharmaconnect
          directory: dist
          gitHubToken: ${{ github.token }}
